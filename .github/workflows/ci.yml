name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: flake8 src/ api/ tests/ --max-line-length=100 --ignore=E402

      - name: Download dataset
        run: python data/download_data.py

      - name: Run unit tests
        run: pytest tests/test_preprocess.py -v --tb=short

      - name: Train model (quick smoke test)
        run: |
          mkdir -p models plots
          python src/train.py --quick-run

      - name: Run API tests
        run: pytest tests/test_api.py -v --tb=short

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: trained-model
          path: models/pipeline.pkl
