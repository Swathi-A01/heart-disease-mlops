apiVersion: apps/v1
kind: Deployment
metadata:
  name: heart-risk-deployment
  labels:
    app: heart-risk-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: heart-risk-api
  template:
    metadata:
      labels:
        app: heart-risk-api
    spec:
      containers:
        - name: heart-risk-api
          image: heart-risk-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
